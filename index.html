<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agendamento de Laboratórios</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <header class="site-header">
      <div>
        <p class="eyebrow">Sistema de Agendamento</p>
        <h1>Salas de Laboratório</h1>
        <p class="description">Reserve, visualize e cancele agendamentos apenas para seu uso.</p>
      </div>
      <div class="user-controls">
        <div id="user-info" class="user-info" aria-live="polite"></div>
        <div class="user-actions">
          <button id="login-button" class="primary-button">Login</button>
          <button id="logout-button" class="secondary-button" style="display:none">Logout</button>
        </div>
      </div>
    </header>

    <section class="panel" id="reservation-panel">
      <h2>Nova Reserva</h2>
      <form id="reservation-form" class="form-grid">
        <label>
          Sala
          <select id="room-select" required></select>
        </label>

        <label>
          Data
          <input type="date" id="date-input" required />
        </label>

        <label>
          Início
          <input type="time" id="start-input" required step="600" />
        </label>

        <label>
          Seu nome
          <input type="text" id="name-input" placeholder="Digite seu nome" required />
        </label>

        <label>
          Papel
          <select id="role-select" required>
            <option value="Professor">Professor</option>
            <option value="Direção">Direção</option>
            <option value="Zelador">Zelador</option>
            <option value="Técnico de manutenção">Técnico de manutenção</option>
          </select>
        </label>

        <label class="full-width">
          Motivo
          <textarea id="reason-input" rows="3" placeholder="Descreva o motivo da reserva" required></textarea>
        </label>

        <div class="form-actions full-width">
          <button type="submit" class="primary-button">Reservar</button>
          <button type="button" id="clear-button" class="secondary-button">Limpar</button>
        </div>
      </form>
      <div id="form-message" class="message" aria-live="polite"></div>
    </section>

    <section class="panel" id="availability-panel">
      <div class="panel-header">
        <h2>Disponibilidade</h2>
        <div class="inline-fields">
          <label>
            Sala
            <select id="view-room-select"></select>
          </label>
          <label>
            Data
            <input type="date" id="view-date-input" />
          </label>
        </div>
      </div>
      <div class="calendar-panel">
        <div class="calendar-controls">
          <button id="cal-prev" class="secondary-button">&larr;</button>
          <div id="calendar-month" class="calendar-month"></div>
          <button id="cal-next" class="secondary-button">&rarr;</button>
        </div>
        <div id="calendar" class="calendar-grid" aria-hidden="false"></div>
      </div>
      <div id="availability-status" class="availability-status"></div>
      <div id="reservation-list" class="reservation-list"></div>
    </section>
  </main>

  <!-- Login overlay -->
  <div id="login-overlay" class="login-overlay" aria-hidden="true">
    <div class="login-card">
      <h2>Entrar</h2>
      <form id="login-form">
        <label>Nome
          <input id="login-name" type="text" required />
        </label>
        <label>Senha
          <input id="login-password" type="password" required />
        </label>
        <div class="form-actions">
          <button id="login-submit" class="primary-button" type="submit">Entrar</button>
          <button id="login-cancel" class="secondary-button" type="button">Fechar</button>
        </div>
      </form>
      <div id="login-message" class="message"></div>
    </div>
  </div>

  <!-- Admin panel (visible only to admin) -->
  <section id="admin-panel" class="panel" style="display:none; margin-top:18px;">
    <h2>Administração</h2>
    <p>Gerenciar confirmações de funcionários</p>
    <div>
      <h3>Pendentes</h3>
      <div id="pending-list"></div>
    </div>
    <div style="margin-top:12px;">
      <h3>Confirmados</h3>
      <div id="confirmed-list"></div>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
